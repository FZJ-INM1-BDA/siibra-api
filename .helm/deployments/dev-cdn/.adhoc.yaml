apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sapi-cdn-cert
spec:
  secretName: sapi-cdn-cert-secret
  renewBefore: 120h 
  commonName: siibra-api-cdn.apps.dev-adacloud.ebrains.eu
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
  - server auth
  dnsNames:
  # (CHANGE ME! same as `commonName`)
  - siibra-api-cdn.apps.dev-adacloud.ebrains.eu
  issuerRef:
    name: letsencrypt-production-issuer-1
    kind: ClusterIssuer 